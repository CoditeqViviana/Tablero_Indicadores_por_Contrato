name: Sync Odoo → Tablero Truput

on:
  schedule:
    - cron: "0 */8 * * *"   # Cada 8 horas (00:00, 08:00, 16:00 UTC)
  workflow_dispatch:         # Botón manual en GitHub Actions

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Necesario para hacer push al repo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sincronizar datos de Odoo
        env:
          ODOO_URL:     ${{ secrets.ODOO_URL }}
          ODOO_DB:      ${{ secrets.ODOO_DB }}
          ODOO_UID:     ${{ secrets.ODOO_UID }}
          ODOO_API_KEY: ${{ secrets.ODOO_API_KEY }}
        run: python sync_script.py

      - name: Commit y push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Sin cambios en los datos"
          else
            git commit -m "sync: $(date -u +'%Y-%m-%d %H:%M') UTC"
            git push
          fi
